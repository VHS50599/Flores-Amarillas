<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lluvia de flores</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background-color: black;
        transition: background-color 3s ease;
    }

    .item {
        position: fixed;
        width: 40px;
        height: 40px;
        pointer-events: none;
    }

    .daisy {
        background-image: url("daisy.png");
        background-size: cover;
        background-position: center;
    }

    .heart {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
    }

    .down {
        top: -50px;
        animation: caer linear forwards;
    }

    .up {
        bottom: -50px;
        animation: subir linear forwards;
    }

    @keyframes caer {
        to {
            transform: translateY(110vh);
        }
    }

    @keyframes subir {
        to {
            transform: translateY(-110vh);
        }
    }
</style>
</head>

<body>

<script>
let items = [];
let velocidadGeneracion = 100;
let fondoCambiado = false;
let faseReducir = false;

let lluviaInversaActiva = false;

// 🎯 función de distribución compartida
function aplicarContenido(el) {
    const tipo = Math.random();

    if (tipo < 0.5) {
        el.classList.add("daisy");
    } else if (tipo < 0.75) {
        el.classList.add("heart");
        el.innerText = "🤍";
    } else {
        el.classList.add("heart");
        el.innerText = "💛";
    }
}

function crearItemDown() {

    if (faseReducir && items.length >= 80) {
        setTimeout(crearItemDown, 100);
        return;
    }

    const el = document.createElement("div");
    el.classList.add("item", "down");

    el.style.left = Math.random() * window.innerWidth + "px";

    aplicarContenido(el);

    const duracion = 3 + Math.random() * 2;
    el.style.animationDuration = duracion + "s";

    document.body.appendChild(el);
    items.push(el);

    setTimeout(() => {
        el.remove();
        items = items.filter(f => f !== el);
    }, duracion * 1000);

    if (!fondoCambiado) {
        if (velocidadGeneracion > 15) {
            velocidadGeneracion -= 2;
        }
    }

    if (items.length > 140 && !fondoCambiado) {
        document.body.style.backgroundColor = "#D4A017";
        fondoCambiado = true;

        setTimeout(() => {
            faseReducir = true;
            lluviaInversaActiva = true;
            iniciarLluviaInversa();
        }, 2000);
    }

    setTimeout(crearItemDown, velocidadGeneracion);
}

// 🌟 lluvia inversa (UP)
function crearItemUp() {

    const el = document.createElement("div");
    el.classList.add("item", "up");

    el.style.left = Math.random() * window.innerWidth + "px";

    aplicarContenido(el);

    const duracion = 3 + Math.random() * 2;
    el.style.animationDuration = duracion + "s";

    document.body.appendChild(el);

    setTimeout(() => {
        el.remove();
    }, duracion * 1000);
}

function iniciarLluviaInversa() {
    if (!lluviaInversaActiva) return;

    crearItemUp();
    setTimeout(iniciarLluviaInversa, 80);
}

crearItemDown();
</script>

</body>
</html>
